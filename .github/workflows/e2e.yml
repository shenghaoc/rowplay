name: E2E

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - uses: actions/checkout@v7

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'static/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'svelte.config.js'
              - 'vite.config.*'
              - 'playwright.config.*'
              - 'scripts/postbuild.mjs'
              - 'wrangler.jsonc'
              - '.node-version'
              - '.github/workflows/e2e.yml'

  e2e-smoke:
    # PR smoke: smoke.spec.ts only on Chromium desktop. Runs when relevant
    # paths change on a PR or push to main.
    # ARM64 hosted runner (GA on free tier for public repos, Aug 2025).
    # Required because the container image below is `-arm64`-suffixed,
    # which forces the linux/arm64 manifest — pulling it on x64 would
    # fail with "no matching manifest".
    runs-on: ubuntu-24.04-arm
    needs: changes
    if: needs.changes.outputs.run_e2e == 'true'
    timeout-minutes: 20
    # Run inside Playwright's official prebuilt image so browsers AND all
    # system dependencies are baked in — bypasses `playwright install
    # --with-deps` that was hanging on GitHub-hosted runners' apt mirror.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-resolute-arm64
      options: --ipc=host
    steps:
      - uses: actions/checkout@v7
      # Install the pinned Node version from .node-version so engine
      # checks and runtime behaviour match local development.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Install pnpm
        run: |
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          echo "Installing pnpm@${PNPM_VERSION}"
          npm install -g "pnpm@${PNPM_VERSION}"
          pnpm config set store-dir /github/home/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /github/home/.pnpm-store
          key: ${{ runner.os }}-${{ runner.arch }}-e2e-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-e2e-pnpm-
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Production build
        run: pnpm exec vp run build
      - name: PR smoke (Chromium desktop)
        run: pnpm exec vp run test:e2e:smoke
        env:
          WRANGLER_SEND_METRICS: "false"
          E2E_SKIP_BUILD: "1"
          # Browsers are already in the Docker image; skip the post-install
          # download that @playwright/test would otherwise trigger.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  e2e-full:
    # Full suite: all specs on Chromium desktop + mobile. Runs on manual
    # dispatch or the nightly schedule. Not a PR merge gate — use for deep
    # verification before a release or after a large refactor.
    # ARM64 hosted runner — same image-swap rationale as e2e-smoke.
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 40
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-resolute-arm64
      options: --ipc=host
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
      - name: Install pnpm
        run: |
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          echo "Installing pnpm@${PNPM_VERSION}"
          npm install -g "pnpm@${PNPM_VERSION}"
          pnpm config set store-dir /github/home/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /github/home/.pnpm-store
          key: ${{ runner.os }}-${{ runner.arch }}-e2e-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-e2e-pnpm-
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Production build
        run: pnpm exec vp run build
      - name: End-to-end (Chromium desktop + mobile)
        run: pnpm exec vp run test:e2e
        env:
          WRANGLER_SEND_METRICS: "false"
          E2E_SKIP_BUILD: "1"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7
