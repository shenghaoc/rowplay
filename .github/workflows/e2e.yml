name: E2E

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'static/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'svelte.config.js'
              - 'vite.config.*'
              - 'playwright.config.*'
              - 'scripts/postbuild.mjs'
              - 'wrangler.jsonc'
              - '.node-version'
              - '.github/workflows/e2e.yml'

  e2e-smoke:
    # PR smoke: smoke.spec.ts only on Chromium desktop. Runs when relevant
    # paths change on a PR or push to main.
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_e2e == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Production build
        run: vp run build
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(vpx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium
        run: vpx playwright install --with-deps chromium
      - name: PR smoke (Chromium desktop)
        run: vp run test:e2e:smoke
        env:
          WRANGLER_SEND_METRICS: "false"
          E2E_SKIP_BUILD: "1"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  e2e-full:
    # Full suite: all specs on Chromium desktop + mobile. Runs on manual
    # dispatch or the nightly schedule. Not a PR merge gate — use for deep
    # verification before a release or after a large refactor.
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Production build
        run: vp run build
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(vpx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium
        run: vpx playwright install --with-deps chromium
      - name: End-to-end (Chromium desktop + mobile)
        run: vp run test:e2e
        env:
          WRANGLER_SEND_METRICS: "false"
          E2E_SKIP_BUILD: "1"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7
