name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.test.ts'
      - 'static/**'
      - 'docs/**'
      - 'migrations/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'svelte.config.js'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'scripts/**'
      - 'wrangler.jsonc'
      - '.nvmrc'
      - '.github/pull_request_template.md'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.test.ts'
      - 'static/**'
      - 'docs/**'
      - 'migrations/**'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'svelte.config.js'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'scripts/**'
      - 'wrangler.jsonc'
      - '.nvmrc'
      - '.github/pull_request_template.md'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Documentation gate
        run: npm run check:docs -- origin/${{ github.base_ref }}

  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'static/**'
              - 'migrations/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'svelte.config.js'
              - 'vite.config.*'
              - 'playwright.config.*'
              - 'scripts/postbuild.mjs'
              - 'wrangler.jsonc'
              - '.nvmrc'
              - '.github/workflows/ci.yml'

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Unit tests
        run: npm run test
      - name: Production build
        run: npm run build
      - name: Locale validation
        run: npm run validate:locales

  e2e-smoke:
    # Playwright smoke runs only for changes that can affect browser/runtime behavior
    # (or manual dispatch) to keep CI time reasonable. The Playwright config starts
    # `wrangler dev`, not `vite dev`, because SvelteKit endpoints, KV/D1 bindings,
    # and adapter output must be exercised on the Workers runtime.
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_e2e == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install WebKit + system deps
        run: npx playwright install --with-deps webkit
      - name: End-to-end smoke (WebKit)
        # WebKit is the browser target for rowplay's smoke suite because Safari/iOS
        # catches runtime and compatibility regressions that Chromium-only CI misses.
        run: npm run test:e2e
        env:
          WRANGLER_SEND_METRICS: 'false'
          E2E_REUSE_SERVER: '1'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
