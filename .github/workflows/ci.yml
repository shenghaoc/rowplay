name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "**/*.test.ts"
      - "static/**"
      - "docs/**"
      - "migrations/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "svelte.config.js"
      - "vite.config.*"
      - "vitest.config.*"
      - "playwright.config.*"
      - "scripts/**"
      - "wrangler.jsonc"
      - ".node-version"
      - ".github/pull_request_template.md"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "**/*.test.ts"
      - "static/**"
      - "docs/**"
      - "migrations/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "svelte.config.js"
      - "vite.config.*"
      - "vitest.config.*"
      - "playwright.config.*"
      - "scripts/**"
      - "wrangler.jsonc"
      - ".node-version"
      - ".github/pull_request_template.md"
      - ".github/workflows/ci.yml"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'static/**'
              - 'migrations/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'svelte.config.js'
              - 'vite.config.*'
              - 'playwright.config.*'
              - 'scripts/postbuild.mjs'
              - 'wrangler.jsonc'
              - '.node-version'
              - '.github/workflows/ci.yml'

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Production build
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build
          path: .svelte-kit
          include-hidden-files: true
          retention-days: 1

  locale-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Locale validation
        run: pnpm validate:locales

  e2e-pr:
    # PR smoke: smoke.spec.ts only on WebKit desktop. Runs when relevant paths
    # change on a PR or push to main, after all quality gates pass. Keeps CI
    # under ~2 min for the common case without dropping Workers-runtime fidelity.
    runs-on: ubuntu-latest
    needs: [changes, typecheck, unit-tests, build, locale-validation]
    if: needs.changes.outputs.run_e2e == 'true' && (github.event_name == 'pull_request' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-build
          path: .svelte-kit
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install WebKit + system deps
        run: pnpm exec playwright install --with-deps webkit
      - name: PR smoke (WebKit desktop)
        run: pnpm test:e2e:smoke
        env:
          WRANGLER_SEND_METRICS: "false"
          E2E_SKIP_BUILD: "1"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-pr
          path: playwright-report/
          retention-days: 7

  e2e-full:
    # Full suite: all specs on WebKit desktop + iPhone 14. Runs on manual
    # dispatch or the nightly schedule. Not a PR merge gate — use for deep
    # verification before a release or after a large refactor.
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests, build, locale-validation]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-build
          path: .svelte-kit
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install WebKit + system deps
        run: pnpm exec playwright install --with-deps webkit
      - name: End-to-end (WebKit desktop + mobile)
        run: pnpm test:e2e
        env:
          WRANGLER_SEND_METRICS: "false"
          E2E_SKIP_BUILD: "1"
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7
