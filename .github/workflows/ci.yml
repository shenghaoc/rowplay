name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.test.ts'
      - 'static/**'
      - 'migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'svelte.config.js'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'wrangler.jsonc'
      - '.nvmrc'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.test.ts'
      - 'static/**'
      - 'migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'svelte.config.js'
      - 'vite.config.*'
      - 'vitest.config.*'
      - 'playwright.config.*'
      - 'wrangler.jsonc'
      - '.nvmrc'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_e2e: ${{ steps.filter.outputs.e2e }}
      run_build: ${{ steps.filter.outputs.build }}

    steps:
      - uses: actions/checkout@v6

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          token: ${{ github.token }}
          filters: |
            e2e:
              - 'src/routes/**'
              - 'src/lib/replay/**'
              - 'src/lib/i18n*'
              - 'src/lib/theme*'
              - 'src/lib/components/**'
              - 'src/app.css'
              - 'src/app.html'
              - 'static/**'
              - 'tests/e2e/**'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.*'
              - '.github/workflows/ci.yml'
            build:
              - 'src/**'
              - 'static/**'
              - 'migrations/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'svelte.config.js'
              - 'vite.config.*'
              - 'wrangler.jsonc'
              - '.nvmrc'
              - '.github/workflows/ci.yml'

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Unit tests
        run: npm run test

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_e2e == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install WebKit + system deps
        run: npx playwright install --with-deps webkit
      - name: End-to-end smoke (WebKit)
        run: npm run test:e2e
        env:
          WRANGLER_SEND_METRICS: 'false'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-verify:
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.run_build == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Production build verification
        run: npm run build
