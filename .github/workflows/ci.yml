name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: vp check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Run checks
        run: vp run check

  browser-tests:
    name: Vitest Browser Mode
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser tests
        run: vp run test:browser
