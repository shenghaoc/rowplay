name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: vp check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
      - name: Install dependencies
        run: vp install
      - name: Run checks
        run: vp run check

  browser-tests:
    name: Vitest Browser Mode
    # ARM64 hosted runner (GA on free tier for public repos, Aug 2025).
    # Required because the container image below is `-arm64`-suffixed,
    # which forces the linux/arm64 manifest — pulling it on x64 would
    # fail with "no matching manifest".
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    # Run the job inside Playwright's official prebuilt image — browsers
    # AND all browser system dependencies are baked in at /ms-playwright.
    # This is what bypasses the `playwright install --with-deps chromium`
    # step that was hanging on the GitHub-hosted (Azure) runners' apt
    # mirror.
    #
    # Tag breakdown:
    #   v1.61.0    — must match @playwright/test in package.json; Playwright's
    #                JS API looks for binaries at a version-specific path.
    #   -resolute  — Ubuntu 26.04 LTS (Resolute Raccoon) base; newer glibc /
    #                fonts than `-noble` (24.04). Container OS does not need
    #                to match the runner host OS.
    #   -arm64     — explicit arch tag (pairs with the ARM64 runner above).
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-resolute-arm64
      # --ipc=host shares the runner's IPC namespace so Chromium's heavy
      # /dev/shm usage isn't capped by Docker's default 64 MB segment
      # (recommended by https://playwright.dev/docs/docker#recommended-docker-configuration;
      # without it the browser-mode suite can crash intermittently inside
      # the container).
      options: --ipc=host
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # The Playwright image ships Node 24, but this repo pins Node >=26.
      # Install the pinned version from .node-version so engine checks
      # and Node 26 features are available.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
      - name: Install pnpm
        run: |
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          echo "Installing pnpm@${PNPM_VERSION}"
          npm install -g "pnpm@${PNPM_VERSION}"
          pnpm config set store-dir /github/home/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /github/home/.pnpm-store
          # Include runner.arch so the linux/arm64 store (this job) and any
          # future linux/x64 caller can't cross-contaminate — pnpm pulls
          # arch-specific native binaries (esbuild, sharp, workerd) into
          # the store and restoring the wrong arch silently breaks builds.
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-playwright-pnpm-
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Run browser tests
        run: pnpm exec vp run test:browser
        env:
          # Browsers are already in the Docker image; skip the post-install
          # download that @playwright/test would otherwise trigger.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
