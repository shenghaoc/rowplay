version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Singapore'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'deps'
    groups:
      svelte:
        patterns:
          - '*svelte*'
        update-types:
          - 'minor'
          - 'patch'
      vite:
        patterns:
          - 'vite'
          - 'vitest'
          - '@vitest/*'
        update-types:
          - 'minor'
          - 'patch'
      typescript:
        patterns:
          - 'typescript'
          - 'tslib'
          - '@typescript-eslint/*'
          - '@types/*'
        update-types:
          - 'minor'
          - 'patch'
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - 'prettier-*'
        update-types:
          - 'minor'
          - 'patch'
      cloudflare:
        patterns:
          - '@cloudflare/*'
          - 'wrangler'
        update-types:
          - 'minor'
          - 'patch'
      miscellaneous:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
    groups:
      actions-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
